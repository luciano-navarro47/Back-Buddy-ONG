name: CI/CD for Testing

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  test-container-job:
    runs-on: ubuntu-latest
    container: node:22

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ${{secrets.POSTGRES_USER}}
          POSTGRES_PASSWORD: ${{secrets.POSTGRES_PASSWORD}}
          POSTGRES_DB: ${{secrets.POSTGRES_DB}}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm ci

      - name: Set up database connection
        run: |
          echo "DATABASE_URL=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}" >> $GITHUB_ENV
          echo "Waiting for Postgres to be ready..."
          sleep 10

      - name: Verificar conexión a PostgreSQL
        run: |
          pg_isready -h localhost -p 5432 -U ${{ secrets.POSTGRES_USER }}

      - run: npm run build --if-present
      - run: npm test
