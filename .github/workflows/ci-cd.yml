name: CI/CD for Testing

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  test-container-job:
    runs-on: ubuntu-latest
    container: node:22

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: ${{secrets.DB_USER}}
          POSTGRES_DB: ${{secrets.TEST_DB_NAME}}
          POSTGRES_PASSWORD: ${{secrets.POSTGRES_PASSWORD}}
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      CI: "true"
      NODE_ENV: ${{secrets.NODE_ENV}}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${{secrets.DB_USER}}
      DB_PASSWORD: ${{secrets.POSTGRES_PASSWORD}}
      DB_NAME: ${{secrets.DB_NAME}}
      TEST_DB_NAME: ${{secrets.TEST_DB_NAME}}
      MP_ACCESS_TOKEN: ${{secrets.ACCESS_TOKEN_MP}}
      UNSPLASH_ACCESS_KEY: ${{secrets.UNSPLASH_ACCESS_KEY}}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }}
      BASE_URL: ${{ secrets.BASE_URL }}
      AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
      AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
      AUTH0_ISSUER_BASE_URL: ${{ secrets.AUTH0_ISSUER_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc

      - name: Install PostgreSQL Client
        run: apt-get update && apt-get install -y postgresql-client
      
      - name: Debug secrets
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}"
          echo "TEST_DB_NAME=${{ secrets.TEST_DB_NAME }}"

      - name: Verify connection to PostgreSQL
        if: github.actor != 'dependabot[bot]'
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h postgres -U ${{ secrets.DB_USER }} -d ${{ secrets.TEST_DB_NAME }}; do
            sleep 2
          done
          echo "PostgreSQL is ready!"
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} psql -h postgres -U ${{secrets.DB_USER}} -d ${{secrets.TEST_DB_NAME}} -c "SELECT 1;"

      - name: Test database connection with TypeORM
        if: github.actor != 'dependabot[bot]'
        run: node dist/index.js

      - name: Run product tests
        if: github.actor != 'dependabot[bot]'
        run: npm test -- --testPathPattern=products.test.ts
        continue-on-error: true

      - name: Run seeders tests
        if: github.actor != 'dependabot[bot]'
        run: npm test -- --testPathPattern=seeders.test.ts
        continue-on-error: true

      - name: Run getRandomData tests
        if: github.actor != 'dependabot[bot]'
        run: npm test -- --testPathPattern=getRandomData.test.ts
        continue-on-error: true
