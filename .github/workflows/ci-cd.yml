name: CI/CD for Testing

on:
    pull_request:
        branches:
            - dev
    push:
        branches:
            - dev

jobs:
    test:
        runs-on: ubuntu-latest
        container:
            image: node:22
        steps:
          - uses: actions/checkout@v3
          - uses: actions/setup-node@v3
            with:
              node-version: 22
          - run: npm ci
          - run: npm test
          - run: npm run build